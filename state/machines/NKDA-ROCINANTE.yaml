name: NKDA-ROCINANTE
platform: win
architecture: arm64

git:
  cloneRoot: "%USERPROFILE%\\source\\repos"

state:
  - ../win/windows-common.yaml
  - ../win/windows-arm64.yaml
  - ../common-personal.yaml
  - ../win/windows-base.yaml
  - ../common-base.yaml

exclusions:
  packages:
    winget: []
    msstore: []

winget:
  packages:
    winget:
      - id: Microsoft.SurfaceApp
        name: Microsoft.SurfaceApp
        required: true

    msstore:
      []

