name: NKDA-BEHEMOTH
platform: win
architecture: x64

git:
  cloneRoot: "%USERPROFILE%\\source\\repos"

state:
  - ../win/windows-common.yaml
  - ../win/windows-x64.yaml
  - ../apps/git-common.yaml

scripts:
  - Resolve-WindowsSetup.ps1
  - Resolve-Winget.ps1
  - Resolve-Node.ps1
  - Resolve-Uv.ps1
  - Resolve-Git.ps1

exclusions:
  packages:
    winget: []
    msstore: []

winget:
  packages:
    winget:
      - id: Nvidia.CUDA
        name: Nvidia.CUDA
        required: true

      - id: Nvidia.PhysX
        name: Nvidia.PhysX
        required: true

      - id: Nvidia.VideoEffectsSDK.20xx-Turing
        name: Nvidia.VideoEffectsSDK.20xx-Turing
        required: true

    msstore:
      []

