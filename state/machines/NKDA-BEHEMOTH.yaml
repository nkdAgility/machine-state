name: NKDA-BEHEMOTH
platform: win
architecture: x64

git:
  cloneRoot: "%USERPROFILE%\\source\\repos"

state:
  - ../win/windows-common.yaml
  - ../win/windows-x64.yaml
  - ../common-personal.yaml
  - ../win/windows-base.yaml
  - ../common-base.yaml

exclusions:
  packages:
    winget: []
    msstore:
      - XP8M0M5N8RB8W7

winget:
  packages:
    winget:
      - id: Nvidia.CUDA
        name: Nvidia.CUDA
        required: true

      - id: Nvidia.PhysX
        name: Nvidia.PhysX
        required: true

      - id: Nvidia.VideoEffectsSDK.20xx-Turing
        name: Nvidia.VideoEffectsSDK.20xx-Turing
        required: true

      - id: Nvidia.VfxSDK
        name: Nvidia.VfxSDK
        required: true

    msstore:
      []

