name: NKDA-BEHEMOTH
platform: win
architecture: x64

git:
  cloneRoot: "%USERPROFILE%\\source\\repos"

state:
  - ../win/windows-common.yaml
  - ../win/windows-x64.yaml
  - ../common-personal.yaml
  - ../win/windows-base.yaml
  - ../common-base.yaml

exclusions:
  packages:
    winget: []
    msstore:
      - XP8M0M5N8RB8W7

winget:
  packages:
    winget:
      - id: Nvidia.CUDA
        name: Nvidia.CUDA
        required: true

      - id: Nvidia.PhysX
        name: Nvidia.PhysX
        required: true

      - id: Nvidia.VideoEffectsSDK.20xx-Turing
        name: Nvidia.VideoEffectsSDK.20xx-Turing
        required: true

      - id: Nvidia.VfxSDK
        name: Nvidia.VfxSDK
        required: true

    msstore:
      []

# Foundry Local models — RTX 3090 (24 GB VRAM). 14B-class dense models run
# comfortably on-GPU (~55-70 t/s measured); gpt-oss-20b is the MoE "step up".
foundry:
  packages:
    foundry:
      - id: qwen3-14b
        name: qwen3-14b
        required: true
      - id: phi-4
        name: phi-4
        required: true
      - id: qwen2.5-coder-14b
        name: qwen2.5-coder-14b
        required: true
      - id: gpt-oss-20b
        name: gpt-oss-20b
        required: true
      - id: phi-4-reasoning
        name: phi-4-reasoning
        required: true
      - id: phi-4-mini
        name: phi-4-mini
        required: true
      - id: qwen3-8b
        name: qwen3-8b
        required: true
      - id: qwen3-embedding-8b
        name: qwen3-embedding-8b
        required: true

