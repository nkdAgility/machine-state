        required: true
      - id: Microsoft.AppInstaller
        name: Microsoft.AppInstaller
        required: true
      - id: Microsoft.DotNet.SDK.10
        name: Microsoft.DotNet.SDK.10
        required: true
        priority: 10
      - id: Microsoft.Edge
        name: Microsoft.Edge
        required: true
      - id: Microsoft.OneDrive
        name: Microsoft.OneDrive
        required: true
      - id: Microsoft.PowerShell
        name: Microsoft.PowerShell
